apiVersion: v1
kind: Pod
metadata:
  name: orchestrator
  labels:
    app: orchestrator
spec:
  containers:
    - name: orchestrator
      image: khordadi/truejit:latest
      imagePullPolicy: Always
      tty: true
      stdin: true
      command: [ "/bin/zsh" ]
      ports:
        - containerPort: 50051
          protocol: TCP
        - containerPort: 50052
          protocol: TCP
      resources:
        requests:
          cpu: "55"
        limits:
          cpu: "55"
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator-service
spec:
  selector:
    app: orchestrator
  ports:
    - protocol: TCP
      port: 50051
      targetPort: 50051
      name: data
    - protocol: TCP
      port: 50052
      targetPort: 50052
      name: control
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: workers
spec:
  replicas: 10
  selector:
    matchLabels:
      app: workers
  template:
    metadata:
      labels:
        app: workers
    spec:
      containers:
        - name: worker
          image: khordadi/truejit:latest
          imagePullPolicy: Always
          tty: true
          stdin: true
          command: [ "/tmp/truejit/scripts/worker.sh", "orchestrator-service" ]
          resources:
            requests:
              cpu: "20"
            limits:
              cpu: "20"